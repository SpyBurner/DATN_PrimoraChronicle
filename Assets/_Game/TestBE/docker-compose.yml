version: '3.8'

services:
  db:
    image: postgres:18-alpine
    command: -p 5433
    environment:
      POSTGRES_USER: ${DB_USER:-testuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-testpass}
      POSTGRES_DB: ${DB_NAME:-testdb}
    ports:
      - "5433:5433"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -p 5433 -U ${DB_USER:-testuser} -d ${DB_NAME:-testdb}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-testuser}:${DB_PASSWORD:-testpass}@db:5433/${DB_NAME:-testdb}
      - HOST_URL=http://localhost:8000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app
